# FUND-OS Nginx 配置（生产：HTTPS 反代 + 支付回调）
# 前端静态文件 + API 反向代理 + Gzip + 安全头 + TLS
#
# 证书放置（由 certbot / 云厂商签发，详见 docker/HTTPS_SETUP.md）：
#   /etc/nginx/certs/fullchain.pem   # 证书链
#   /etc/nginx/certs/privkey.pem     # 私钥
# Docker 部署时把宿主机 ./certs 挂载到 /etc/nginx/certs（见 docker-compose.yml）。

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# 提升私钥/证书文件读取权限所需
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;  # 隐藏版本号，降低信息泄露

    # ====== 日志格式（JSON，便于 ELK 解析）=====
    log_format json_log escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/access.log json_log;

    # ====== 性能优化 ======
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ====== 上游（Flask 应用，gunicorn 监听 5000）=====
    # 注意：proxy_pass 一律【不带尾斜杠】，保留原始 URI（含 /api 前缀），
    # 否则 /api/billing/notify/alipay 会被错误转发为 /billing/notify/alipay 导致 404。
    upstream flask_app {
        server 127.0.0.1:5000;
        keepalive 32;
    }

    # ====== HTTP(80)：仅用于 ACME 校验 + 301 跳转 HTTPS ======
    server {
        listen 80;
        server_name _;

        # Let's Encrypt http-01 校验目录（certbot --webroot）。
        # certbot 会在该目录下写入校验文件，放行但禁止目录遍历。
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            allow all;
        }

        # 其余全部 301 跳转到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ====== HTTPS(443)：主服务 ======
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # ---- TLS 证书（挂载到 /etc/nginx/certs）----
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # 现代协议与套件（禁用 TLS1.0/1.1）
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        # ssl_trusted_certificate /etc/nginx/certs/chain.pem;  # OCSP 装订所需（可选）

        root /app/visualization/dist;
        index index.html;

        # ====== 安全头 ======
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data: blob:;" always;
        # HSTS：强制浏览器仅 HTTPS 访问（max-age 半年，含子域）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # CORS（API 跨域）
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ====== 上游代理公共设置 ======
        # 重要：X-Forwarded-Proto 固定为 https，使 Flask 侧 request.scheme 正确，
        # 回调/回跳构造的 notify/return URL 才是 https（支付宝/微信要求 HTTPS 公网）。
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        # ====== 支付回调 / API（保留 /api 前缀）======
        location /api/ {
            proxy_pass http://flask_app;
        }

        # ====== WebSocket 代理（保留 /ws 前缀）======
        location /ws/ {
            proxy_pass http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # ====== 服务端渲染页面（非 /api，但由 Flask 提供，不能交给 SPA）======
        # 否则 SPA fallback 会把 /billing、/pricing 当成客户端路由而返回 index.html。
        location = /billing {
            proxy_pass http://flask_app;
        }
        location = /pricing {
            proxy_pass http://flask_app;
        }
        location /sandbox/ {
            proxy_pass http://flask_app;
        }

        # ====== Prometheus 指标端点（仅内网）======
        location = /metrics {
            allow 172.28.0.0/16;
            deny all;
            proxy_pass http://flask_app;
        }

        # ====== 静态资源缓存 ======
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ====== SPA fallback（Vue history 模式）======
        # 仅兜底未被上述规则命中的前端路由，交由 Vue 处理。
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ====== 错误页 ======
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
