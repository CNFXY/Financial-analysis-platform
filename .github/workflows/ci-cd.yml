# ============================================
# FUND-OS CI/CD Pipeline (临时诊断版)
# 用于定位长期 0-jobs failure 的根因:
# 暂移除 env / permissions / environment / deploy jobs, 仅保留三个 smoke job。
# ============================================

name: FUND-OS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ==================== Lint & Test ====================
  lint-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: smoke
        run: echo "lint-test smoke ok"

  # ==================== Regression Tests ====================
  test:
    name: Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: smoke
        run: echo "test smoke ok"

  # ==================== Build ====================
  build:
    name: Build & Package
    needs: [lint-test, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: smoke
        run: echo "build smoke ok"
