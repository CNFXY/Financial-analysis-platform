# ============================================================
# FUND-OS Shell 脚本 CI 静态检查
# 即使开发者跳过本地 pre-commit，也在 PR / 推送时强制校验 scripts/*.sh。
# ============================================================
name: Lint Shell Scripts

on:
  push:
    paths:
      - "scripts/**/*.sh"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "scripts/**/*.sh"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: bash 语法检查 + shellcheck
        run: |
          fail=0
          for f in scripts/*.sh; do
            echo "== $f =="
            bash -n "$f" || fail=1
            shellcheck "$f" || fail=1
          done
          exit $fail
