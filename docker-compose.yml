# ============================================
# FUND-OS v5.0 Docker Compose 编排
# 完整企业级部署配置
# ============================================

version: '3.9'

services:
  # ==================== 应用服务 ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fund-os-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://fundos:${DB_PASSWORD:-fundos123}@postgres:5432/fundos
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-min-32-chars}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./data:/app/data          # 持久化数据
      - ./logs:/app/logs           # 日志文件
      - ./cache:/app/cache         # 文件缓存
      - ./certs:/etc/nginx/certs:ro   # TLS 证书（宿主机 ./certs → 容器内只读）
      - ./certbot:/var/www/certbot:ro # certbot http-01 校验目录
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fund-os-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:16-alpine
    container_name: fund-os-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fundos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fundos123}
      POSTGRES_DB: fundos
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 初始化脚本（首次启动执行）
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - fund-os-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fundos -d fundos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: fund-os-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - fund-os-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 300M

  # ==================== Prometheus 监控 ====================
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: fund-os-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - fund-os-network
    depends_on:
      - app

  # ==================== Grafana 可视化 ====================
  grafana:
    image: grafana/grafana:10.3.0
    container_name: fund-os-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafanadata:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - fund-os-network
    depends_on:
      - prometheus

networks:
  fund-os-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  promdata:
    driver: local
  grafanadata:
    driver: local
