<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUND-OS · 估值锚定</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="loader-overlay">
    <div class="loader-logo">FUND-OS</div>
    <div class="loader-sub">INITIALIZING...</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>
<canvas id="particle-canvas"></canvas>
<div id="cursor-glow"></div>
<div class="float-orb float-orb-1"></div>
<div class="float-orb float-orb-2"></div>

<nav class="navbar"><div class="nav-brand">FUND-OS</div><ul class="nav-menu"></ul></nav>

<main class="container">
    <script>document.addEventListener("DOMContentLoaded", ()=>{ buildBreadcrumb([{label:'首页',href:'/'},{label:'估值锚定',href:'/valuation'}]); });</script>

    <section class="hero" style="padding:60px 20px 30px;">
        <h1>估值<span class="highlight">锚定</span>分析</h1>
        <p class="hero-subtitle">基于历史价格分位 · 识别当前价格处于低估 / 合理 / 高估区间 · 测算支撑与压力锚点</p>
    </section>

    <section class="panel-3d reveal">
        <div class="section-header">
            <h2>标的选择</h2>
            <span class="badge badge-gold">真实历史数据</span>
        </div>
        <div class="quick-estimate-form">
            <div class="form-inline">
                <div class="form-group" style="flex:2;min-width:200px;">
                    <label>基金 / 股票代码</label>
                    <input type="text" id="val-code" placeholder="如 510300.SH / 600519.SH / SPY" value="510300.SH">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>类型</label>
                    <select id="val-type">
                        <option value="cn">中国基金/股票</option>
                        <option value="cn_stock">A股股票</option>
                        <option value="us">海外标的</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>回看周期</label>
                    <select id="val-days">
                        <option value="252">1年</option>
                        <option value="504" selected>2年</option>
                        <option value="756">3年</option>
                        <option value="1260">5年</option>
                    </select>
                </div>
                <div class="form-group" style="flex:0 0 auto;align-self:flex-end;">
                    <button class="btn-3d" onclick="runValuation()"><span>开始锚定</span></button>
                </div>
            </div>
        </div>
    </section>

    <section class="panel-3d reveal" id="val-result" style="display:none;">
        <div class="section-header">
            <h2>估值结论</h2>
            <span class="badge" id="val-zone-badge">--</span>
        </div>

        <div class="result-cards" id="val-cards">
            <div class="result-card"><div class="label">当前价格/净值</div><div class="value" id="val-current">--</div></div>
            <div class="result-card"><div class="label">历史分位</div><div class="value glow-gold" id="val-pct">--</div></div>
            <div class="result-card"><div class="label">历史均值</div><div class="value" id="val-mean">--</div></div>
            <div class="result-card"><div class="label">历史中值</div><div class="value" id="val-median">--</div></div>
        </div>

        <div class="val-extra" id="val-extra" style="margin-top:18px;display:flex;gap:24px;flex-wrap:wrap;font-size:13px;color:var(--text-dim);"></div>

        <div class="chart-container" style="margin-top:28px;">
            <div class="chart-header"><div class="chart-title">📈 价格历史与估值锚点</div></div>
            <canvas id="valChart" style="max-height:380px;"></canvas>
        </div>

        <div class="section-header" style="margin-top:32px;"><h2>估值锚点（支撑 / 压力）</h2></div>
        <div class="anchors-grid" id="val-anchors"></div>
    </section>
</main>

<footer class="footer">
    <div class="footer-bottom"><p>◆ FUND-OS 估值锚定 · 基于历史分位的相对估值，仅供参考，不构成投资建议</p></div>
</footer>

<script src="{{ url_for('static', filename='main.js') }}"></script>
<script>
let valChartInstance = null;

async function runValuation(){
    const code = document.getElementById('val-code').value.trim();
    const type = document.getElementById('val-type').value;
    const days = parseInt(document.getElementById('val-days').value);
    const panel = document.getElementById('val-result');
    panel.style.display = 'block';
    document.getElementById('val-cards').innerHTML = '<div class="loading">正在计算估值锚定...</div>';
    try{
        const res = await postJSON('/api/valuation/anchor', { code, type, days });
        if (res.error){ alert(res.error); return; }

        document.getElementById('val-current').textContent = res.current;
        document.getElementById('val-pct').textContent = res.percentile + ' %';
        document.getElementById('val-mean').textContent = res.mean;
        document.getElementById('val-median').textContent = res.median;

        const badge = document.getElementById('val-zone-badge');
        badge.textContent = res.zone;
        badge.className = 'badge ' + (res.zone_color==='up'?'badge-success':res.zone_color==='down'?'badge-danger':'badge-info');

        document.getElementById('val-extra').innerHTML = `
            <span>区间: <b>${res.min}</b> ~ <b>${res.max}</b></span>
            <span>偏离均值: <b class="${res.deviation_from_mean_pct>=0?'up':'down'}">${res.deviation_from_mean_pct}%</b></span>
            <span>偏离中值: <b class="${res.deviation_from_median_pct>=0?'up':'down'}">${res.deviation_from_median_pct}%</b></span>
            <span>20日动量: <b class="${res.momentum_20d_pct>=0?'up':'down'}">${res.momentum_20d_pct}%</b></span>
            <span>60日动量: <b class="${res.momentum_60d_pct>=0?'up':'down'}">${res.momentum_60d_pct}%</b></span>
            <span>年化波动: <b>${res.annual_volatility_pct}%</b></span>
            <span>样本: <b>${res.data_points}</b> 个交易日</span>`;

        renderValChart(res);
        renderAnchors(res.anchors, res.current);
    }catch(e){
        document.getElementById('val-cards').innerHTML = '<span style="color:#ff4d6d">计算失败: '+e.message+'</span>';
    }
}

function renderValChart(res){
    const ctx = document.getElementById('valChart');
    if (valChartInstance) valChartInstance.destroy();
    const labels = res.dates, prices = res.prices;
    const anchorVals = res.anchors.map(a=>a.value);
    const minV = Math.min(...prices, ...anchorVals), maxV = Math.max(...prices, ...anchorVals);
    const yMin = minV*0.97, yMax = maxV*1.03;

    const anchorLines = res.anchors.map((a,i)=>({
        label: a.label,
        data: labels.map(()=>a.value),
        borderColor: a.type==='support' ? 'rgba(0,240,160,.5)' : a.type==='pressure' ? 'rgba(255,77,109,.5)' : 'rgba(240,176,32,.6)',
        borderWidth: a.type==='median'?2:1,
        borderDash: [5,4],
        pointRadius: 0,
        fill: false,
        tension: 0,
    }));

    valChartInstance = new Chart(ctx, {
        type:'line',
        data:{ labels, datasets:[
            { label:'价格/净值', data:prices, borderColor:'#f0b020', backgroundColor:'rgba(240,176,32,.08)', fill:true, tension:.2, pointRadius:0, borderWidth:2 },
            ...anchorLines
        ]},
        options:{
            responsive:true, maintainAspectRatio:false,
            interaction:{ mode:'index', intersect:false },
            plugins:{
                legend:{ labels:{ color:'#8a9ab0', font:{size:11, family:"'JetBrains Mono', monospace"} } },
                tooltip:{ backgroundColor:'rgba(8,14,28,.95)', borderColor:'#f0b020', borderWidth:1,
                    callbacks:{ label:(c)=> c.dataset.label && c.dataset.label.indexOf('价格')>=0 ? ` ${c.parsed.y}` : ` ${c.dataset.label}: ${c.parsed.y}` } }
            },
            scales:{
                x:{ ticks:{ maxTicksLimit:10, color:'#5a6a80', font:{size:10, family:"'JetBrains Mono', monospace"} }, grid:{ display:false } },
                y:{ min:yMin, max:yMax, ticks:{ color:'#5a6a80', font:{size:11, family:"'JetBrains Mono', monospace"} }, grid:{ color:'rgba(240,176,32,.05)' } }
            }
        }
    });
}

function renderAnchors(anchors, current){
    const grid = document.getElementById('val-anchors');
    grid.innerHTML = anchors.map(a=>{
        const cls = a.type==='support'?'anchor-support':a.type==='pressure'?'anchor-pressure':'anchor-median';
        const dist = ((a.value-current)/current*100);
        const distCls = dist>=0?'up':'down';
        return `<div class="anchor-card ${cls}">
            <div class="anchor-label">${a.label}</div>
            <div class="anchor-value">${a.value}</div>
            <div class="anchor-dist ${distCls}">${dist>=0?'+':''}${dist.toFixed(2)}%</div>
        </div>`;
    }).join('');
}
</script>

<style>
.anchors-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
.anchor-card{ background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
.anchor-card.anchor-support{ border-left:3px solid var(--success); }
.anchor-card.anchor-pressure{ border-left:3px solid #ff4d6d; }
.anchor-card.anchor-median{ border-left:3px solid var(--gold); }
.anchor-label{ font-size:12px; color:var(--text-muted); margin-bottom:8px; }
.anchor-value{ font-size:20px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--text-bright); }
.anchor-dist{ font-size:12px; margin-top:6px; }
</style>
</body>
</html>
