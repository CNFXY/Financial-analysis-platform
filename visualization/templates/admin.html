<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUND-OS · 管理后台</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
.admin-page { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 64px); }
.admin-sidebar {
    background: rgba(8,14,28,0.95); border-right: 1px solid rgba(240,176,32,0.1);
    padding: 20px 0; overflow-y: auto;
}
.admin-sidebar h3 {
    color: #f0b020; font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
    padding: 0 20px; margin: 20px 0 12px; font-family: 'JetBrains Mono', monospace;
}
.admin-nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 20px;
    color: #8a9ab0; text-decoration: none; font-size: 13px;
    transition: all 0.2s; border-left: 3px solid transparent; cursor: pointer;
}
.admin-nav-item:hover, .admin-nav-item.active { color: #e8e0d0; background: rgba(240,176,32,0.06); border-left-color: #f0b020; }
.admin-nav-item .icon { width: 18px; text-align: center; font-size: 15px; }
.admin-main { padding: 28px; overflow-y: auto; background: rgba(6,8,15,0.5); }
.admin-section { display: none; }
.admin-section.active { display: block; animation: fadeInUp 0.3s ease; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.section-header h2 { margin: 0; font-size: 22px; display: flex; align-items: center; gap: 10px; }

/* 统计卡片 */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card-admin {
    background: linear-gradient(135deg, rgba(12,22,40,0.8), rgba(12,22,40,0.4));
    border: 1px solid rgba(240,176,32,0.1); border-radius: 14px; padding: 22px;
    position: relative; overflow: hidden;
}
.stat-card-admin::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.stat-card-admin .val { font-size: 32px; font-weight:800; color:#fff; font-family:'JetBrains Mono',monospace; }
.stat-card-admin .lbl { font-size: 12px; color:#5a6a80; margin-top:6px; text-transform:uppercase; letter-spacing:1px; }
.stat-card-admin .sub { font-size: 11px; color:#8a9ab0; margin-top:8px; font-family:'JetBrains Mono',monospace; }
.stat-card-admin.revenue .val { color:#07c160; }
.stat-card-admin.orders .val { color:#f0b020; }
.stat-card-admin.users .val { color:#00d4ff; }

/* 数据表格增强 */
.data-table-wrap { background: rgba(12,22,40,0.6); border: 1px solid rgba(240,176,32,0.08); border-radius: 14px; overflow: hidden; }
.data-table-wrap table { width: 100%; border-collapse: collapse; font-size: 13px; font-family:'JetBrains Mono',monospace; }
.data-table-wrap thead th {
    background: rgba(240,176,32,0.06); color: #8a9ab0; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px; text-align: left;
    border-bottom: 2px solid rgba(240,176,32,0.12);
}
.data-table-wrap td { padding: 11px 16px; border-bottom: 1px solid rgba(240,176,32,0.04); color: #e8e0d0; }
.data-table-wrap tbody tr:hover { background: rgba(240,176,32,0.03); }
.badge-status { display:inline-block; padding:2px 10px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-paid { background:rgba(7,193,96,0.12); color:#07c160; border:1px solid rgba(7,193,96,0.25); }
.badge-pending { background:rgba(240,176,32,0.12); color:#f0b020; border:1px solid rgba(240,176,32,0.25); }
.badge-trial { background:rgba(0,212,255,0.1); color:#00d4ff; border:1px solid rgba(0,212,255,0.2); }
.badge-active { background:rgba(45,212,191,0.1); color:#2dd4bf; border:1px solid rgba(45,212,191,0.2); }
.badge-free { background:rgba(138,154,176,0.1); color:#8a9ab0; border:1px solid rgba(138,154,176,0.2); }
.badge-refunded { background:rgba(255,79,79,0.1); color:#ff4d4f; border:1px solid rgba(255,79,79,0.2); }

/* 操作按钮 */
.btn-sm { padding:5px 12px; font-size:11px; border-radius:7px; cursor:pointer; transition:all 0.2s; border:none; font-weight:600; font-family:'JetBrains Mono',monospace; }
.btn-danger { background:rgba(255,79,79,0.12); color:#ff8a8c; border:1px solid rgba(255,79,79,0.25); }
.btn-danger:hover { background:rgba(255,79,79,0.22); }
.btn-success { background:rgba(45,212,191,0.12); color:#2dd4bf; border:1px solid rgba(45,212,191,0.25); }
.btn-success:hover { background:rgba(45,212,191,0.22); }
.btn-primary { background:rgba(240,176,32,0.12); color:#f0b020; border:1px solid rgba(240,176,32,0.25); }
.btn-primary:hover { background:rgba(240,176,32,0.22); }

/* 表单 */
.form-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; align-items:flex-end; }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-group label { font-size:11px; color:#5a6a80; text-transform:uppercase; letter-spacing:0.5px; font-family:'JetBrains Mono',monospace; }
.form-group input, .form-group select {
    background:rgba(12,22,40,0.6); border:1px solid rgba(240,176,32,0.15); color:#e8e0d0;
    padding:9px 12px; border-radius:9px; font-size:13px; outline:none; font-family:'JetBrains Mono',monospace; min-width:160px;
}
.form-group input:focus, .form-group select:focus { border-color:#f0b020; box-shadow:0 0 0 3px rgba(240,176,32,0.08); }

/* 系统监控条 */
.sys-bar { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:24px; }
.sys-item { background:rgba(12,22,40,0.5); border:1px solid rgba(240,176,32,0.08); border-radius:10px; padding:14px; }
.sys-item .sys-lbl { font-size:11px; color:#5a6a80; margin-bottom:6px; }
.sys-bar-outer { height:6px; background:rgba(240,176,32,0.06); border-radius:3px; overflow:hidden; }
.sys-bar-inner { height:100%; border-radius:3px; transition:width 0.5s ease; }

@media(max-width:900px) { .admin-page { grid-template-columns:1fr; } .admin-sidebar { display:none; } }
</style>
</head>
<body>

<nav class="navbar"><div class="nav-brand">FUND-OS</div><ul class="nav-menu"></ul></nav>

<div class="admin-page">
<!-- 侧边栏 -->
<aside class="admin-sidebar">
    <h3>◆ 管理后台</h3>
    <a class="admin-nav-item active" data-section="dashboard" onclick="switchSection('dashboard')">
        <span class="icon">&#9783;</span> 仪表盘
    </a>
    <a class="admin-nav-item" data-section="tenants" onclick="switchSection('tenants')">
        <span class="icon">&#128101;</span> 租户管理
    </a>
    <a class="admin-nav-item" data-section="orders" onclick="switchSection('orders')">
        <span class="icon">&#128179;</span> 订单管理
    </a>
    <a class="admin-nav-item" data-section="system" onclick="switchSection('system')">
        <span class="icon">&#9881;</span> 系统监控
    </a>
</aside>

<!-- 主内容 -->
<main class="admin-main">

<!-- ====== 仪表盘 ====== -->
<section id="sec-dashboard" class="admin-section active">
    <div class="section-header">
        <h2>&#128202; 运营仪表盘</h2>
        <span style="color:#5a6a80;font-size:13px;font-family:'JetBrains Mono',monospace;" id="dash-time"></span>
    </div>
    <div class="stats-row" id="stats-cards">
        <div class="loading">加载统计数据...</div>
    </div>
    
    <div class="panel-3d" style="padding:0;overflow:hidden;">
        <div style="padding:18px 22px;border-bottom:1px solid rgba(240,176,32,0.08);">
            <h3 style="margin:0;font-size:15px;">最近订单</h3>
        </div>
        <div class="data-table-wrap" style="border:none;border-radius:0;">
            <table><thead><tr><th>订单号</th><th>租户</th><th>套餐</th><th>金额</th><th>状态</th><th>时间</th></tr></thead>
            <tbody id="recent-orders-body"><tr><td colspan="6" style="text-align:center;color:#5a6a80;">加载中...</td></tr></tbody>
            </table>
        </div>
    </div>
</section>

<!-- ====== 租户管理 ====== -->
<section id="sec-tenants" class="admin-section">
    <div class="section-header">
        <h2>&#128101; 租户管理</h2>
        <button class="btn-3d btn-sm btn-success" onclick="showCreateTenant()">+ 新建租户</button>
    </div>
    
    <div id="tenant-form" class="panel-3d" style="display:none;margin-bottom:20px;padding:22px;">
        <h4 style="margin:0 0 16px;">新建租户</h4>
        <div class="form-row">
            <div class="form-group">
                <label>租户 ID</label>
                <input id="new-tid" placeholder="如 acme、demo_user" />
            </div>
            <div class="form-group">
                <label>初始套餐</label>
                <select id="new-plan"><option value="free">免费版</option><option value="pro">专业版 Pro</option><option value="enterprise">机构版 Enterprise</option></select>
            </div>
            <div class="form-group">
                <label>备注</label>
                <input id="new-note" placeholder="可选备注信息" />
            </div>
            <button class="btn-3d" style="align-self:flex-end;" onclick="createTenant()">创建</button>
        </div>
    </div>
    
    <div class="data-table-wrap">
        <table><thead><tr><th>租户ID</th><th>当前套餐</th><th>状态</th><th>到期时间</th><th>API配额</th><th>自选数量</th></tr></thead>
        <tbody id="tenants-body"><tr><td colspan="6" style="text-align:center;color:#5a6a80;">加载中...</td></tr></tbody>
        </table>
    </div>
</section>

<!-- ====== 订单管理 ====== -->
<section id="sec-orders" class="admin-section">
    <div class="section-header">
        <h2>&#128179; 订单管理</h2>
        <div class="form-row" style="margin:0;">
            <select id="order-filter-status" onchange="loadOrders()">
                <option value="">全部状态</option><option value="pending">待支付</option>
                <option value="paid">已支付</option><option value="refunded">已退款</option>
            </select>
            <select id="order-filter-plan" onchange="loadOrders()">
                <option value="">全部套餐</option><option value="pro">Pro</option><option value="enterprise">Enterprise</option>
            </select>
        </div>
    </div>
    <div class="data-table-wrap">
        <table><thead><tr><th>订单号</th><th>租户</th><th>套餐</th><th>金额</th><th>支付方式</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
        <tbody id="orders-body"><tr><td colspan="8" style="text-align:center;color:#5a6a80;">加载中...</td></tr></tbody>
        </table>
    </div>
    <div id="orders-pagination" style="margin-top:16px;text-align:center;"></div>
</section>

<!-- ====== 系统监控 ====== -->
<section id="sec-system" class="admin-section">
    <div class="section-header">
        <h2>&#9881; 系统监控</h2>
        <button class="btn-3d btn-sm btn-primary" onclick="refreshSystem()">刷新数据</button>
    </div>
    <div class="sys-bar" id="sys-bars"></div>
    <div class="stats-row" id="sys-stats"></div>
</section>

</main>
</div>

<script src="{{ url_for('static', filename='main.js') }}"></script>
<script>
let currentSection = 'dashboard';

function switchSection(sec) {
    currentSection = sec;
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.admin-nav-item').forEach(n => n.classList.remove('active'));
    const target = document.getElementById('sec-' + sec);
    if (target) target.classList.add('active');
    document.querySelectorAll(`[data-section="${sec}"]`).forEach(n => n.classList.add('active');
    
    // 加载数据
    if (sec === 'dashboard') loadDashboard();
    if (sec === 'tenants') loadTenants();
    if (sec === 'orders') loadOrders();
    if (sec === 'system') refreshSystem();
}

// ========== 仪表盘 ==========
async function loadDashboard() {
    try {
        const d = await (await fetch('/api/admin/stats')).json();
        
        document.getElementById('dash-time').textContent = new Date().toLocaleString('zh-CN');
        
        document.getElementById('stats-cards').innerHTML = `
            <div class="stat-card-admin users">
                <div class="val">${d.total_tenants || 0}</div>
                <div class="lbl">总租户数</div>
                <div class="sub">活跃 ${d.active_tenants || 0} / 试用 ${d.trial_tenants || 0}</div>
            </div>
            <div class="stat-card-admin orders">
                <div class="val">${d.total_orders || 0}</div>
                <div class="lbl">总订单数</div>
                <div class="sub">今日 +${d.today_orders || 0} / 本月 +${d.month_orders || 0}</div>
            </div>
            <div class="stat-card-admin revenue">
                <div class="val">¥${(d.total_revenue || 0).toLocaleString()}</div>
                <div class="lbl">累计收入</div>
                <div class="sub">本月 ¥${(d.month_revenue || 0).toLocaleString()}</div>
            </div>
            <div class="stat-card-admin">
                <div class="val">${((d.plan_distribution && d.plan_distribution.enterprise) || 0)}</div>
                <div class="lbl">机构客户</div>
                <div class="sub">Free ${(d.plan_distribution||{}).free||0} / Pro ${(d.plan_distribution||{}).pro||0} / Ent ${(d.plan_distribution||{}).enterprise||0}</div>
            </div>
        `;
        
        const tbody = document.getElementById('recent-orders-body');
        const recent = d.recent_orders || [];
        if (!recent.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#5a6a80;">暂无订单记录</td></tr>'; return; }
        tbody.innerHTML = recent.map(o => `
            <tr><td style="font-family:'JetBrains Mono',monospace;font-size:11px;">${o.order_id||'--'}</td>
                <td>${o.tenant_id||'--'}</td>
                <td>${o.plan_name||o.plan_code||'--'}</td>
                <td style="font-weight:700;">¥${((o.amount_cents||0)/100).toFixed(2)}</td>
                <td><span class="badge-status badge-${o.status==='paid'?'paid':o.status==='refunded'?'refunded':'pending'}">${o.status==='paid'?'已付':o.status==='refunded'?'已退款':'待支付'}</span></td>
                <td style="color:#5a6a80;font-size:11px;">${o.created_at||'--'}</td></tr>`).join('');
    } catch(e) { console.error(e); }
}

// ========== 租户管理 ==========
async function loadTenants() {
    try {
        const d = await (await fetch('/api/admin/tenants')).json();
        const tbody = document.getElementById('tenants-body');
        const tenants = d.tenants || [];
        if (!tenants.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#5a6a80;">暂无租户数据</td></tr>'; return; }
        tbody.innerHTML = tenants.map(t => `
            <tr><td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--gold);">${t.tenant_id}</td>
                <td>${t.plan_name||t.plan||'--'}</td>
                <td><span class="badge-status badge-${t.status==='active'?'active':t.status==='trial'?'trial':'free'}">${t.status==='active'?'活跃':t.status==='trial'?'试用':'免费'}</span></td>
                <td>${t.expires_at||'--'}</td>
                <td>${t.quota_used_api||'--'}</td>
                <td>${t.quota_watchlist||'--'}</td></tr>`).join('');
    } catch(e) { console.error(e); }
}

function showCreateTenant() {
    const f = document.getElementById('tenant-form');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

async function createTenant() {
    const tid = document.getElementById('new-tid').value.trim();
    const plan = document.getElementById('new-plan').value;
    const note = document.getElementById('new-note').value.trim();
    if (!tid) return alert('请输入租户 ID');
    
    const d = await (await fetch('/api/admin/tenants',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tenant_id:tid,plan,note})})).json();
    if (d.success) { alert('✓ 租户 '+tid+' 创建成功'); loadTenants(); showCreateTenant(); }
    else alert('失败: '+(d.reason||'未知错误'));
}

// ========== 订单管理 ==========
let orderPage = 1;
async function loadOrders() {
    try {
        const status = document.getElementById('order-filter-status').value;
        const plan = document.getElementById('order-filter-plan').value;
        const qs = '?page='+orderPage+'&limit=20'+(status?'&status='+status:'')+(plan?'&plan='+plan:'');
        const d = await (await fetch('/api/admin/orders'+qs)).json();
        const tbody = document.getElementById('orders-body');
        const orders = d.orders || [];
        
        if (!orders.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#5a6a80;">暂无符合条件的订单</td></tr>'; return; }
        
        tbody.innerHTML = orders.map(o => `
            <tr><td style="font-family:'JetBrains Mono',monospace;font-size:11px;">${o.order_id||'--'}</td>
                <td>${o.tenant_id||'--'}</td>
                <td>${o.plan_name||o.plan_code||'--'}</td>
                <td style="font-weight:700;">¥${((o.amount_cents||0)/100).toFixed(2)}</td>
                <td>${o.payment_channel||'--'}</td>
                <td><span class="badge-status badge-${o.status==='paid'?'paid':o.status==='refunded'?'refunded':'pending'}">${o.status==='paid'?'已付':o.status==='refunded'?'已退款':'待支付'}</span></td>
                <td style="color:#5a6a80;font-size:11px;">${o.created_at||'--'}</td>
                <td>${o.status==='paid'?`<button class="btn-sm btn-danger" onclick="refundOrder('${o.order_id}')">退款</button>`:'--'}</td></tr>`).join('');
        
        // 分页
        const pg = document.getElementById('orders-pagination');
        if (d.pages > 1) {
            let html = `<span style="color:#5a6a80;font-size:12px;margin-right:12px;">第 ${d.page}/${d.pages} 页 · 共 ${d.total} 条</span>`;
            if (d.page > 1) html += `<button class="btn-sm btn-primary" onclick="orderPage=${d.page-1};loadOrders()">上一页</button> `;
            if (d.page < d.pages) html += ` <button class="btn-sm btn-primary" onclick="orderPage=${d.page+1};loadOrders()">下一页</button>`;
            pg.innerHTML = html;
        } else { pg.innerHTML = ''; }
    } catch(e) { console.error(e); }
}

async function refundOrder(oid) {
    if (!confirm('确认退款订单 '+oid+'？')) return;
    const d = await (await fetch('/api/admin/orders/'+oid+'/refund',{method:'POST'})).json();
    if (d.success) { alert('✓ 已退款'); loadOrders(); loadDashboard(); }
    else alert('失败: '+(d.reason||'未知'));
}

// ========== 系统监控 ==========
async function refreshSystem() {
    try {
        const d = await (await fetch('/api/admin/system')).json();
        
        document.getElementById('sys-bars').innerHTML = `
            <div class="sys-item"><div class="sys-lbl">CPU 使用率</div>
                <div class="sys-bar-outer"><div class="sys-bar-inner" style="width:${d.cpu_percent||0}%;background:${(d.cpu_percent||0)>80?'#ff4d4f':'#f0b020'}"></div></div>
                <div style="font-size:12px;color:#8a9ab0;margin-top:4px;font-family:'JetBrains Mono',monospace;">${d.cpu_percent||0}%</div></div>
            <div class="sys-item"><div class="sys-lbl">内存使用</div>
                <div class="sys-bar-outer"><div class="sys-bar-inner" style="width:${d.memory?d.memory.percent:0}%;background:${d.memory&&d.memory.percent>85?'#ff4d4f':'#00d4ff'}"></div></div>
                <div style="font-size:12px;color:#8a9ab0;margin-top:4px;font-family:'JetBrains Mono',monospace;">${d.memory?(d.memory.used_gb+'/'+d.memory.total_gb+' GB'): '--'}</div></div>
            <div class="sys-item"><div class="sys-lbl">磁盘使用</div>
                <div class="sys-bar-outer"><div class="sys-bar-inner" style="width:${d.disk?d.disk.percent:0}%;background:${d.disk&&d.disk.percent>90?'#ff4d4f':'#2dd4bf'}"></div></div>
                <div style="font-size:12px;color:#8a9ab0;margin-top:4px;font-family:'JetBrains Mono',monospace;'>${d.disk?(d.disk.free_gb+' 可用 / '+d.disk.total_gb+' GB'): '--'}</div></div>
        `;
        
        document.getElementById('sys-stats').innerHTML = `
            <div class="stat-card-admin"><div class="val">${d.python_processes||0}</div><div class="lbl">Python 进程</div></div>
            <div class="stat-card-admin"><div class="val">${d.cache_size_mb||0}<small style="font-size:14px;color:#5a6a80;"> MB</small></div><div class="lbl">缓存大小</div></div>
            <div class="stat-card-admin"><div class="val">${Math.floor((d.uptime_seconds||0)/3600)}<small style="font-size:14px;color:#5a6a80;">h</small></div><div class="lbl">系统运行时间</div></div>
        `;
    } catch(e) {
        document.getElementById('sys-bars').innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><p>系统监控需要 psutil 包（pip install psutil）</p></div>';
    }
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    buildNavbar();
    loadDashboard();
});
</script>
</body>
</html>
