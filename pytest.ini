# ============================================
# FUND-OS 正式 pytest 配置
# 本地：make test  /  CI：pytest -m regression
# ============================================
[pytest]
# 测试目录
testpaths = tests

# 导入路径（相对本配置文件所在目录 = fund_estimation_system）：
#   "."   -> fund_estimation_system 目录（使 core/models/... 可直接 import）
#   ".."  -> workspace 根（使 fund_estimation_system.* 前缀可解析）
pythonpath = . ..

# 默认输出：汇总 + 简洁
addopts = -ra -q

# 标记定义
markers =
    regression: 已验证的常驻回归用例（P0 安全/计费、P1 限流/密码策略、端到端冒烟）

# 忽略与测试无关的第三方依赖告警，保持输出整洁
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnhandledThreadExceptionWarning
